    // --- DRAW SPRITE UTILITY ---
    function drawSprite(ctx, grid, x, y, pixelSize = 4) {
        const rows = grid.length;
        const cols = grid[0].length;
        const width = cols * pixelSize;
        const height = rows * pixelSize;
        const startX = x - width / 2;
        const startY = y - height / 2;
        
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const color = grid[r][c];
                if (color) {
                    ctx.fillStyle = color;
                    ctx.fillRect(
                        Math.floor(startX + c * pixelSize), 
                        Math.floor(startY + r * pixelSize), 
                        pixelSize, pixelSize
                    );
                }
            }
        }
    }

    // --- SCORE SYSTEM ---
    function addScore(amount) {
        if (inBossFight) return; 
        score += amount;
        checkMilestone();
    }

    function checkMilestone() {
        if (nextMilestoneIndex >= BOSS_MILESTONES.length) return;
        if (score >= BOSS_MILESTONES[nextMilestoneIndex]) {
            nextMilestoneIndex++;
            inBossFight = true;       
            spawnerActive = false;    
            clearAllEnemies();        
            startBossWarning();       
        }
    }

    function clearAllEnemies() {
        enemies.forEach(e => {
            const col = e.color || '#ffffff';
            for (let i = 0; i < 4; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.5 + Math.random() * 2;
                const vx = Math.cos(angle) * speed;
                const vy = Math.sin(angle) * speed;
                spawnParticle(e.x, e.y, vx, vy, col, 3, 15);
            }
        });
        enemies = [];
    }

    function startBossWarning() {
        bossWarningActive = true;
        bossWarningTimer = 2200; 
        playBossWarning();
    }

    // --- REDESIGNED SOUND SYSTEM ---
    function throttleSound(type) {
        const now = Date.now();
        if (lastPlayed[type] && now - lastPlayed[type] < 60) {
            return false; 
        }
        lastPlayed[type] = now;
        return true;
    }

    function getNoiseBuffer() {
        if (!audioCtx) return null;
        if (!noiseBuffer) {
            try {
                const sampleRate = audioCtx.sampleRate;
                noiseBuffer = audioCtx.createBuffer(1, sampleRate, sampleRate);
                const data = noiseBuffer.getChannelData(0);
                for (let i = 0; i < sampleRate; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
            } catch (e) {
                return null;
            }
        }
        return noiseBuffer;
    }

    function initAudio() {
        if (!audioCtx) {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.setValueAtTime(0.85, audioCtx.currentTime); 
                masterGain.connect(audioCtx.destination);
                getNoiseBuffer(); 
            } catch (e) {
                console.error("Audio Context initialization failed:", e);
            }
        }
    }

    function unlockAudio() {
        if (audioUnlocked) return;
        initAudio();
        if (audioCtx) {
            audioCtx.resume().then(() => {
                audioUnlocked = true;
                playClickSound();
            }).catch(err => {
                console.warn("Audio Context unlock failed:", err);
            });
        }
    }

    function playShootSound() {
        if (!audioCtx || audioCtx.state === 'suspended' || !masterGain) return;
        if (!throttleSound('shoot')) return;
        try {
            const now = audioCtx.currentTime;
            const duration = 0.09; 
            const startFreq = 1200 + (Math.random() * 100 - 50); 

            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sawtooth';
            osc1.frequency.setValueAtTime(startFreq, now);
            osc1.frequency.exponentialRampToValueAtTime(300, now + duration);
            
            gain1.gain.setValueAtTime(0.22, now);
            gain1.gain.exponentialRampToValueAtTime(0.001, now + duration);
            
            osc1.connect(gain1);
            gain1.connect(masterGain);

            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sawtooth';
            osc2.frequency.setValueAtTime(startFreq * 2, now);
            osc2.frequency.exponentialRampToValueAtTime(600, now + duration);
            
            gain2.gain.setValueAtTime(0.08, now);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + duration);
            
            osc2.connect(gain2);
            gain2.connect(masterGain);
            
            osc1.start(now);
            osc1.stop(now + duration);
            osc2.start(now);
            osc2.stop(now + duration);
        } catch (e) {}
    }

    function playClickSound() {
        if (!audioCtx || audioCtx.state === 'suspended' || !masterGain) return;
        if (!throttleSound('click')) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.setValueAtTime(750, audioCtx.currentTime + 0.05);
            
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        } catch (e) {}
    }

    function playExplosionSound() {
        if (!audioCtx || audioCtx.state === 'suspended' || !masterGain) return;
        if (!throttleSound('explosion')) return;
        try {
            const now = audioCtx.currentTime;
            const duration = 0.22; 
            const buffer = getNoiseBuffer();

            if (buffer) {
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                const startFilterFreq = 2000 + (Math.random() * 400 - 200); 
                filter.frequency.setValueAtTime(startFilterFreq, now);
                filter.frequency.exponentialRampToValueAtTime(200, now + duration);

                const gainA = audioCtx.createGain();

    // --- VISUAL FEEDBACK TRIGGERS (PARTICLES, DECAY & FLASHES) ---
    function spawnParticle(x, y, vx, vy, color, size, lifetimeInFrames) {
        const p = particles.find(p => !p.active);
        if (p) {
            p.active = true;
            p.x = x;
            p.y = y;
            p.vx = vx;
            p.vy = vy;
            p.color = color;
            p.size = size;
            p.startSize = size;
            p.lifetime = lifetimeInFrames;
            p.maxLifetime = lifetimeInFrames;
        }
    }

    function spawnDeathFlash(x, y) {
        deathFlashes.push({
            x: x,
            y: y,
            frame: 0,
            maxFrames: 7 
        });
    }

    function triggerEnemyDeath(e) {
        playExplosionSound();
        addScore(e.xp);
        
        const col = e.color || '#ffffff';
        for (let i = 0; i < 8; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 4;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            spawnParticle(e.x, e.y, vx, vy, col, 4, 21); 
        }
        
        spawnDeathFlash(e.x, e.y);
    }

    function triggerPlayerHitSparks(x, y) {
        const colors = ['#ffffff', '#ffaa00', '#ff5500'];
        for (let i = 0; i < 6; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 3;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            const color = colors[Math.floor(Math.random() * colors.length)];
            spawnParticle(x, y, vx, vy, color, 3, 18); 
        }
    }

    function updateAndDrawFlashes(ctx) {
        for (let i = deathFlashes.length - 1; i >= 0; i--) {
            const f = deathFlashes[i];
            f.frame++;
            const pct = f.frame / f.maxFrames;
            if (pct > 1) {
                deathFlashes.splice(i, 1);
                continue;
            }
            const radius = 2 + 14 * pct; 
            const opacity = 0.9 * (1 - pct); 
            ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
            ctx.beginPath();
            ctx.arc(f.x, f.y, radius, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function updateAndDrawParticles(ctx) {
        ctx.save();
        for (let i = 0; i < MAX_PARTICLES; i++) {
            const p = particles[i];
            if (p.active) {
                p.x += p.vx;
                p.y += p.vy;
                p.lifetime--;
                if (p.lifetime <= 0) {
                    p.active = false;
                    continue;
                }
                const currentSize = p.startSize * (p.lifetime / p.maxLifetime);
                ctx.fillStyle = p.color;
                ctx.fillRect(Math.floor(p.x - currentSize / 2), Math.floor(p.y - currentSize / 2), currentSize, currentSize);
            }
        }
        ctx.restore();
    }

    function updateStars() {
        stars1.forEach(s => { s.y += 0.5; if (s.y > 640) s.y = 0; });
        stars2.forEach(s => { s.y += 1.0; if (s.y > 640) s.y = 0; });
        stars3.forEach(s => { s.y += 1.8; if (s.y > 640) s.y = 0; });
    }

    function drawStars(ctx) {
        ctx.fillStyle = '#ffffff';
        stars1.forEach(s => ctx.fillRect(s.x, s.y, 1, 1));
        
        ctx.fillStyle = '#00ffff';
        stars2.forEach(s => ctx.fillRect(s.x, s.y, 2, 2));
        
        ctx.fillStyle = '#ffff00';
        stars3.forEach(s => ctx.fillRect(s.x, s.y, 3, 3));
    }

    function drawMoon(ctx) {
        let glow = ctx.createRadialGradient(280, 100, 60, 280, 100, 95);
        glow.addColorStop(0, 'rgba(50, 50, 100, 0.35)');
        glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(280, 100, 95, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#15152a';
        ctx.beginPath();
        ctx.arc(280, 100, 70, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#0c0c1b';
        moonCraters.forEach(c => {
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    // --- PLAYER CONFIGURATION ---
    function resetGame() {
        score = 0;
        lives = 3;
        player.x = 180;
        player.y = 500;
        player.targetX = 180;
        player.targetY = 500;
        bullets = [];
        lastShotTime = 0;
        enemies = [];
        enemyBullets = [];
        isInvincible = false;
        invincibilityTimer = 0;
        nextSpawnTime = Date.now() + 1000;

        particles.forEach(p => p.active = false);
        deathFlashes.length = 0;
        playerDamageFlashFrame = 0;

        activeBoss = null;
        inBossFight = false;
        bossesDefeated = 0;
        nextMilestoneIndex = 0;
        bossWarningTimer = 0;
        bossWarningActive = false;
        spawnerActive = true;
        showBossDefeatedText = 0;
        lastTime = performance.now();
    }

    function triggerPlayerHit() {
        if (isInvincible) return;
        lives -= 1;
        playPlayerHitSound();
        
        playerDamageFlashFrame = playerDamageFlashMax;
        triggerPlayerHitSparks(player.x, player.y);

        if (lives <= 0) {
            state = 'TITLE';
        } else {
            isInvincible = true;
            invincibilityTimer = Date.now() + 1500;
        }
    }

    function drawPlayerShip(ctx, x, y, frame) {
        if (isInvincible) {
            const now = Date.now();
            if (now > invincibilityTimer) {
                isInvincible = false;
            } else {
                if (Math.floor(frame / 4) % 2 === 0) {
                    return;
                }
            }
        }

        if (Math.floor(frame / 3) % 2 === 0) {
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(x - 4, y + 18, 8, 6);
            ctx.fillStyle = '#ff5500';
            ctx.fillRect(x - 2, y + 22, 4, 4);
        } else {
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(x - 4, y + 18, 8, 4);
        }

        drawSprite(ctx, PLAYER_SPRITE, x, y, 4);
    }

    function drawLives(ctx, count) {
        const startX = 335;
        const startY = 25;
        const spacing = 18;
        for (let i = 0; i < count; i++) {
            drawSprite(ctx, PLAYER_SPRITE, startX - (i * spacing), startY, 2);
        }
    }

    // --- ENEMY SPAWNER LOGIC ---
    function getRandomEnemyType() {
        const activePool = ENEMY_TYPES;
        let totalWeight = 0;
        activePool.forEach(t => totalWeight += t.weight);
        let rand = Math.random() * totalWeight;
        for (let i = 0; i < activePool.length; i++) {
            if (rand < activePool[i].weight) {
                return activePool[i];
            }
            rand -= activePool[i].weight;
        }
        return activePool[0];
    }

    function spawnEnemy() {
        const type = getRandomEnemyType();
        const margin = type.w / 2;
        const spawnX = margin + Math.random() * (360 - margin * 2);
        const enemyObj = {
            id: type.id,
            name: type.name,
            x: spawnX,
            y: -40,
            w: type.w,
            h: type.h,
            hp: type.hp,
            maxHP: type.hp, 
            xp: type.xp,
            color: type.color,
            speed: type.speed,
            customUpdate: type.update,
            customDraw: type.draw
        };
        if (type.init) {
            type.init(enemyObj);
        }
        enemies.push(enemyObj);
    }

    // --- COLLISION DETECTION ---
    function checkCollisions() {
        // Player Bullets vs Enemies
        for (let bIdx = bullets.length - 1; bIdx >= 0; bIdx--) {
            const b = bullets[bIdx];
            for (let eIdx = enemies.length - 1; eIdx >= 0; eIdx--) {
                const e = enemies[eIdx];

                const ex1 = e.x - e.w / 2 + 2;
                const ex2 = e.x + e.w / 2 - 2;
                const ey1 = e.y - e.h / 2 + 2;
                const ey2 = e.y + e.h / 2 - 2;

                const bx1 = b.x - 2;
                const bx2 = b.x + 2;
                const by1 = b.y - 6;
                const by2 = b.y + 6;

                if (bx1 < ex2 && bx2 > ex1 && by1 < ey2 && by2 > ey1) {
                    if (e.id === 6 && e.shieldActive && e.shieldHP > 0 && b.y > e.y) {
                        bullets.splice(bIdx, 1);
                        e.shieldHP -= 1;
                        if (e.shieldHP <= 0) {
                            e.shieldActive = false;
                        }
                        playShieldHitSound();
                        break;
                    }

                    e.hp -= 1;
                    bullets.splice(bIdx, 1);
                    if (e.hp <= 0) {
                        triggerEnemyDeath(e); 
                        enemies.splice(eIdx, 1);
                    } else {
                        playHitSound();
                    }
                    break;
                }
            }
        }

        // Boss collision with Player Bullets
        if (activeBoss && activeBoss.state !== 'ENTRY' && !activeBoss.dying) {
            const bx1 = activeBoss.x - activeBoss.w / 2;
            const bx2 = activeBoss.x + activeBoss.w / 2;
            const by1 = activeBoss.y - activeBoss.h / 2;
            const by2 = activeBoss.y + activeBoss.h / 2;

            for (let bIdx = bullets.length - 1; bIdx >= 0; bIdx--) {
                const b = bullets[bIdx];
                if (b.x >= bx1 && b.x <= bx2 && b.y >= by1 && b.y <= by2) {
                    bullets.splice(bIdx, 1);
                    activeBoss.hp -= 1;
                    activeBoss.flashTimer = 5; 
                    playHitSound();

                    if (activeBoss.hp <= 0) {
                        triggerBossDeath();
                    }
                    break;
                }
            }
        }

        // Enemy Bullets vs Player
        const px1 = player.x - 12;
        const px2 = player.x + 12;
        const py1 = player.y - 15;
        const py2 = player.y + 15;

        if (!isInvincible) {
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const eb = enemyBullets[i];
                const halfW = (eb.w || 6) / 2;
                const halfH = (eb.h || 6) / 2;
                const ebx1 = eb.x - halfW;
                const ebx2 = eb.x + halfW;
                const eby1 = eb.y - halfH;
                const eby2 = eb.y + halfH;

                if (ebx1 < px2 && ebx2 > px1 && eby1 < py2 && eby2 > py1) {
                    enemyBullets.splice(i, 1);
                    triggerPlayerHit();
                    break;
                }
            }

            // Player vs Enemies (Ramming)
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const ex1 = e.x - e.w / 2 + 2;
                const ex2 = e.x + e.w / 2 - 2;
                const ey1 = e.y - e.h / 2 + 2;
                const ey2 = e.y + e.h / 2 - 2;

                if (ex1 < px2 && ex2 > px1 && ey1 < py2 && ey2 > py1) {
                    triggerEnemyDeath(e); 
                    enemies.splice(i, 1);
                    triggerPlayerHit();
                    break;
                }
            }

            // Player vs Boss (Ramming)
            if (activeBoss && activeBoss.state !== 'ENTRY' && !activeBoss.dying) {
                const bx1 = activeBoss.x - activeBoss.w / 2;
                const bx2 = activeBoss.x + activeBoss.w / 2;
                const by1 = activeBoss.y - activeBoss.h / 2;
                const by2 = activeBoss.y + activeBoss.h / 2;

                if (px1 < bx2 && px2 > bx1 && py1 < by2 && py2 > by1) {
                    triggerPlayerHit();
                }
            }
        }
    }

    // --- UI BUTTON DEFINITIONS ---
    const startButton = { x: 80, y: 340, w: 200, h: 44 };
    const howToPlayButton = { x: 80, y: 400, w: 200, h: 44 };
    const backButton = { x: 105, y: 480, w: 150, h: 44 };
    const resumeButton = { x: 80, y: 280, w: 200, h: 44 };
    const menuButton = { x: 80, y: 340, w: 200, h: 44 };
    const pauseButton = { x: 15, y: 45, w: 32, h: 32 };

    function drawButton(ctx, btn, text) {
        ctx.save();
        ctx.fillStyle = '#0099aa';
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
        ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 15px "Courier New", Courier, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, btn.x + btn.w / 2, btn.y + btn.h / 2 + 1);
        ctx.restore();
    }

    function isPointInRect(px, py, rect) {
        return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
    }

    // --- COORDINATE CONVERSION FOR SCALING ---
    function getCanvasCoords(e, canvas) {
        const rect = canvas.getBoundingClientRect();
        let clientX, clientY;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    // --- INPUT EVENT HANDLING ---
    function handleStart(e, isTouch) {
        unlockAudio();
        const coords = getCanvasCoords(e, canvas);

        if (state === 'TITLE') {
            if (isPointInRect(coords.x, coords.y, startButton)) {
                playClickSound();
                resetGame();
                state = 'PLAYING';
            } else if (isPointInRect(coords.x, coords.y, howToPlayButton)) {
                playClickSound();
                state = 'HOW_TO_PLAY';
            }
        } else if (state === 'HOW_TO_PLAY') {
            if (isPointInRect(coords.x, coords.y, backButton)) {
                playClickSound();
                state = 'TITLE';
            }
        } else if (state === 'PLAYING') {
            if (isPointInRect(coords.x, coords.y, pauseButton)) {
                playClickSound();
                state = 'PAUSED';
            } else {
                isDragging = true;
                player.targetX = coords.x;
                player.targetY = coords.y;
            }
        } else if (state === 'PAUSED') {
            if (isPointInRect(coords.x, coords.y, resumeButton)) {
                playClickSound();
                state = 'PLAYING';
            } else if (isPointInRect(coords.x, coords.y, menuButton)) {
                playClickSound();
                state = 'TITLE';
            }
        }
    }

    function handleMove(e) {
        if (state === 'PLAYING' && isDragging) {
            const coords = getCanvasCoords(e, canvas);
            player.targetX = coords.x;
            player.targetY = coords.y;
        }
    }

    function handleEnd(e) {
        isDragging = false;
    }

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleStart(e, true);
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        handleMove(e);
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        handleEnd(e);
    }, { passive: false });

    canvas.addEventListener('mousedown', (e) => {
        handleStart(e, false);
    });

    canvas.addEventListener('mousemove', (e) => {
        handleMove(e);
    });

    window.addEventListener('mouseup', (e) => {
        handleEnd(e);
    });

    // --- BOSS SYSTEM DRAW & RENDER UTILITIES ---
    function drawBoss(ctx, b) {
        if (!b) return;
        ctx.save();
        
        let drawWhite = false;
        if (b.flashTimer > 0) {
            b.flashTimer--;
            if (Math.floor(b.flashTimer / 3) % 2 === 0) {
                drawWhite = true;
            }
        }
        
        let sprite = null;
        if (b.id === 1) sprite = BOSS1_SPRITE;
        else if (b.id === 2) sprite = BOSS2_SPRITE;
        else if (b.id === 3) sprite = BOSS3_SPRITE;
        else if (b.id === 4) sprite = BOSS4_SPRITE;
        else if (b.id === 5) sprite = BOSS5_SPRITE;
        
        if (sprite) {
            const rows = sprite.length;
            const cols = sprite[0].length;
            const pixelSize = 5;
            const width = cols * pixelSize;
            const height = rows * pixelSize;
            const startX = b.x - width / 2;
            const startY = b.y - height / 2;
            
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    let color = sprite[r][c];
                    if (color) {
                        if (drawWhite) {
                            color = '#ffffff';
                        } else {
                            if (b.id === 3 && color === '#ff0000') {
                                if (b.laserPhase === 'CHARGE') {
                                    if (Math.floor(frameCount / 6) % 2 === 0) {
                                        color = '#ffffff';
                                    }
                                }
                            }
                            if (b.id === 4 && color === '#ffffff') {
                                if (Math.floor(frameCount / 12) % 2 === 0) {
                                    color = '#aaccff';
                                }
                            }
                        }
                        ctx.fillStyle = color;
                        ctx.fillRect(
                            Math.floor(startX + c * pixelSize), 
                            Math.floor(startY + r * pixelSize), 
                            pixelSize, pixelSize
                        );
                    }
                }
            }
            
            if (b.id === 5 && b.phase === 2 && !drawWhite) {
                ctx.fillStyle = 'rgba(180, 0, 0, 0.20)';
                ctx.fillRect(Math.floor(startX), Math.floor(startY), width, height);
            }
        }
        
        ctx.restore();
    }

    function drawBossHealthBar(ctx) {
        if (!activeBoss || activeBoss.dying) return;
        
        const bx = 20;
        const by = 46;
        const bw = 320;
        const bh = 14;
        
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 11px "Courier New", Courier, monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`[ ${activeBoss.name} ]`, 180, 42);
        
        ctx.fillStyle = '#330000';
        ctx.fillRect(bx, by, bw, bh);
        
        const pct = Math.max(0, activeBoss.hp / activeBoss.maxHP);
        let fillColor = '#ff3300'; 
        if (pct <= 0.3) {
            fillColor = '#ffcc00'; 
        } else if (pct <= 0.6) {
            fillColor = '#ff6600'; 
        }
        
        ctx.fillStyle = fillColor;
        ctx.fillRect(bx, by, bw * pct, bh);
        
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 9px "Courier New", Courier, monospace';
        ctx.textAlign = 'right';
        ctx.textBaseline = 'middle';
        ctx.fillText(`HP: ${Math.floor(activeBoss.hp)}/${activeBoss.maxHP}`, bx + bw - 5, by + bh / 2 + 1);
    }

    function drawBossWarningScreen(ctx) {
        if (!bossWarningActive) return;
        
        const cycle = Math.floor(bossWarningTimer) % 460;
        if (cycle < 280) {
            ctx.fillStyle = 'rgba(180, 0, 0, 0.25)';
            ctx.fillRect(0, 0, 360, 640);
        }
        
        const panelW = 280;
        const panelH = 130;
        const px = 180 - panelW / 2;
        const py = 320 - panelH / 2;
        
        ctx.fillStyle = '#110000';
        ctx.strokeStyle = '#cc0000';
        ctx.lineWidth = 3;
        ctx.fillRect(px, py, panelW, panelH);
        ctx.strokeRect(px, py, panelW, panelH);
        
        const isFlashOn = Math.floor(bossWarningTimer / 83) % 2 === 0;
        if (isFlashOn) {
            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold 22px "Courier New", Courier, monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText("⚠  WARNING  ⚠", 180, 320 - 25);
        }
        
        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 15px "Courier New", Courier, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText("BOSS APPROACHING", 180, 320 + 20);
    }

    // --- GAME ENGINE LOOP ---
    function loop() {
        frameCount++;

        const nowTime = performance.now();
        const deltaTime = nowTime - lastTime;
        lastTime = nowTime;

        // Update Parallax Background
        updateStars();

        if (state === 'PLAYING') {
            player.x += (player.targetX - player.x) * 0.15;
            player.y += (player.targetY - player.y) * 0.15;

            const halfW = player.width / 2;
            const halfH = player.height / 2;
            if (player.x < halfW) player.x = halfW;
            if (player.x > 360 - halfW) player.x = 360 - halfW;
            if (player.y < halfH) player.y = halfH;
            if (player.y > 640 - halfH) player.y = 640 - halfH;

            const currentTime = Date.now();
            if (currentTime - lastShotTime >= 400) {
                bullets.push({ x: player.x, y: player.y - 20 });
                lastShotTime = currentTime;
                playShootSound();
            }

            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= 13;
                if (bullets[i].y < -20) {
                    bullets.splice(i, 1);
                }
            }

            // --- BOSS CONTROLLER AND AI TIMERS ---
            if (bossWarningActive) {
                bossWarningTimer -= deltaTime;
                if (bossWarningTimer <= 0) {
                    bossWarningActive = false;
                    spawnBoss(bossesDefeated + 1);
                }
            }

            if (activeBoss && activeBoss.dying) {
                bossDeathTimer -= deltaTime;
                if (Math.floor(bossDeathTimer) % 200 < Math.floor(bossDeathTimer - deltaTime) % 200) {
                    const rx = bossDeathPos.x + (Math.random() * activeBoss.w - activeBoss.w / 2);
                    const ry = bossDeathPos.y + (Math.random() * activeBoss.h - activeBoss.h / 2);
                    const colors = ['#ffcc00', '#ff5500', '#ffffff'];
                    for (let i = 0; i < 6; i++) {
                        const angle = Math.random() * Math.PI * 2;
                        const speed = 1.0 + Math.random() * 3.0;
                        const col = colors[Math.floor(Math.random() * colors.length)];
                        spawnParticle(rx, ry, Math.cos(angle)*speed, Math.sin(angle)*speed, col, 3, 20);
                    }
                    playExplosionSound();
                }
                if (bossDeathTimer <= 0) {
                    activeBoss = null;
                    inBossFight = false;
                    spawnerActive = true;
                    bossesDefeated++;
                    showBossDefeatedText = 120; 
                }
            }

            if (activeBoss && !activeBoss.dying) {
                activeBoss.tick++;
                
                if (activeBoss.state === 'ENTRY') {
                    let targetY = 85;
                    if (activeBoss.id === 2) targetY = 90;
                    if (activeBoss.id === 3) targetY = 80;
                    if (activeBoss.id === 4) targetY = 85;
                    if (activeBoss.id === 5) targetY = 100;
                    
                    let entrySpeed = 2.0;
                    if (activeBoss.id === 2) entrySpeed = 1.5;
                    if (activeBoss.id === 3) entrySpeed = 1.0;
                    if (activeBoss.id === 5) entrySpeed = 1.5;
                    
                    if (activeBoss.y < targetY) {
                        activeBoss.y += entrySpeed;
                    } else {
                        activeBoss.y = targetY;
                        activeBoss.state = 'PATROL';
                        activeBoss.lastAttackTime = currentTime;
                        activeBoss.lastAttackATime = currentTime;
                        activeBoss.lastAttackBTime = currentTime;
                        activeBoss.lastAttackCTime = currentTime;
                    }
                } else {
                    if (activeBoss.id === 1) {
                        activeBoss.x += activeBoss.dir * 2.0;
                        if (activeBoss.x < 50 || activeBoss.x > 310) {
                            activeBoss.dir *= -1;
                        }
                        
                        if (currentTime - activeBoss.lastAttackTime >= 1350 && currentTime - activeBoss.lastAttackTime < 1500 && activeBoss.flashTimer === 0) {
                            activeBoss.flashTimer = 9; 
                        }
                        if (currentTime - activeBoss.lastAttackTime >= 1500) {
                            activeBoss.lastAttackTime = currentTime;
                            const angles = [-20, 0, 20];
                            angles.forEach(deg => {
                                const rad = deg * Math.PI / 180;
                                const vx = Math.sin(rad) * 3.5;
                                const vy = Math.cos(rad) * 3.5;
                                spawnEnemyBullet(activeBoss.x, activeBoss.y + 20, vx, vy, '#ff4400', 6, 6);
                            });
                            playShootSound();
                        }
                    } else if (activeBoss.id === 2) {
                        activeBoss.t++;
                        activeBoss.x = 180 + Math.cos(activeBoss.t * 0.015) * 110;
                        activeBoss.y = 90 + Math.sin(activeBoss.t * 0.030) * 28;
                        
                        if (currentTime - activeBoss.lastAttackATime >= 1000 && currentTime - activeBoss.lastAttackATime < 1200 && activeBoss.flashTimer === 0) {
                            activeBoss.flashTimer = 12; 
                        }
                        if (currentTime - activeBoss.lastAttackATime >= 1200) {
                            activeBoss.lastAttackATime = currentTime;
                            const angle = Math.atan2(player.y - activeBoss.y, player.x - activeBoss.x);
                            const vx = Math.cos(angle) * 4.5;
                            const vy = Math.sin(angle) * 4.5;
                            spawnEnemyBullet(activeBoss.x, activeBoss.y + 15, vx, vy, '#0099ff', 5, 9);
                            playShootSound();
                        }
                        
                        if (currentTime - activeBoss.lastAttackBTime >= 3000) {
                            activeBoss.lastAttackBTime = currentTime;
                            spawnEnemyBullet(activeBoss.x, activeBoss.y + 15, 0, 2.0, '#ff8800', 12, 12, true);
                            playShootSound();
                        }
                    } else if (activeBoss.id === 3) {
                        activeBoss.x += activeBoss.dir * 1.0;
                        if (activeBoss.x < 60 || activeBoss.x > 300) {
                            activeBoss.dir *= -1;
                        }
                        
                        if (activeBoss.laserPhase === 'READY' && currentTime - activeBoss.lastAttackATime >= 6000) {
                            activeBoss.laserPhase = 'CHARGE';
                            activeBoss.laserTimer = 1000; 
                            playDeathStarChargeSound();
                        }
                        
                        if (activeBoss.laserPhase === 'CHARGE') {
                            activeBoss.laserTimer -= deltaTime;
                            if (activeBoss.laserTimer <= 0) {
                                activeBoss.laserPhase = 'FIRE';
                                activeBoss.laserTimer = 900; 
                                playDeathStarLaserSound();
                            }
                        } else if (activeBoss.laserPhase === 'FIRE') {
                            activeBoss.laserTimer -= deltaTime;
                            if (Math.abs(player.x - activeBoss.x) < 12) {
                                triggerPlayerHit();
                            }
                            if (activeBoss.laserTimer <= 0) {
                                activeBoss.laserPhase = 'COOLDOWN';
                                activeBoss.lastAttackATime = currentTime;
                            }
                        } else if (activeBoss.laserPhase === 'COOLDOWN') {
                            activeBoss.laserPhase = 'READY';
                        }
                        
                        if (currentTime - activeBoss.lastAttackBTime >= 1850 && currentTime - activeBoss.lastAttackBTime < 2000 && activeBoss.flashTimer === 0) {
                            activeBoss.flashTimer = 9; 
                        }
                        if (currentTime - activeBoss.lastAttackBTime >= 2000) {
                            activeBoss.lastAttackBTime = currentTime;
                            const angles = [-40, -20, 0, 20, 40];
                            angles.forEach(deg => {
                                const rad = deg * Math.PI / 180;
                                const vx = Math.sin(rad) * 3.0;
                                const vy = Math.cos(rad) * 3.0;
                                spawnEnemyBullet(activeBoss.x, activeBoss.y + 20, vx, vy, '#cc2200', 5, 5);
                            });
                            playShootSound();
                        }
                        
                        if (currentTime - activeBoss.lastAttackCTime >= 4500) {
                            activeBoss.lastAttackCTime = currentTime;
                            spawnZeroXpScout(activeBoss.x - 30, activeBoss.y + 40);
                            spawnZeroXpScout(activeBoss.x + 30, activeBoss.y + 40);
                        }
                    } else if (activeBoss.id === 4) {
                        activeBoss.modeTimer += deltaTime;
                        if (activeBoss.modeTimer >= 3000) {
                            activeBoss.modeTimer = 0;
                            activeBoss.patrolMode = activeBoss.patrolMode === 'A' ? 'B' : 'A';
                        }
                        
                        if (activeBoss.patrolMode === 'A') {
                            activeBoss.x += activeBoss.dir * 1.8;
                            if (activeBoss.x < 50 || activeBoss.x > 310) {
                                activeBoss.dir *= -1;
                            }
                        } else if (activeBoss.patrolMode === 'B') {
                            const oldX = activeBoss.x;
                            activeBoss.x = Math.floor(60 + Math.random() * 240);
                            activeBoss.flashTimer = 9; 
                            playTeleportSound();
                            
                            for (let i = 0; i < 4; i++) {
                                const angle = Math.random() * Math.PI * 2;
                                const speed = 1.5 + Math.random() * 2;
                                spawnParticle(oldX, activeBoss.y, Math.cos(angle)*speed, Math.sin(angle)*speed, '#00ffff', 3, 15);
                            }
                            activeBoss.patrolMode = 'A';
                        }
                        
                        if (currentTime - activeBoss.lastAttackATime >= 1500 && currentTime - activeBoss.lastAttackATime < 1800 && activeBoss.flashTimer === 0) {
                            activeBoss.flashTimer = 18; 
                        }
                        if (currentTime - activeBoss.lastAttackATime >= 1800) {
                            activeBoss.lastAttackATime = currentTime;
                            const angles = [-35, -15, 15, 35]; 
                            angles.forEach(deg => {
                                const rad = deg * Math.PI / 180;
                                const vx = Math.sin(rad) * 3.8;
                                const vy = Math.cos(rad) * 3.8;
                                spawnEnemyBullet(activeBoss.x, activeBoss.y + 20, vx, vy, '#0099ff', 6, 6);
                            });
                            playShootSound();
                        }
                        
                        if (currentTime - activeBoss.lastAttackBTime >= 4000) {
                            activeBoss.lastAttackBTime = currentTime;
                            spawnHomingMissile(activeBoss.x, activeBoss.y + 20);
                        }
                        
                        if (currentTime - activeBoss.lastAttackCTime >= 5000) {
                            activeBoss.lastAttackCTime = currentTime;
                            spawnZeroXpArmored(activeBoss.x - 35, activeBoss.y + 40);
                            spawnZeroXpArmored(activeBoss.x + 35, activeBoss.y + 40);
                        }
                    } else if (activeBoss.id === 5) {
                        if (activeBoss.phase === 1 && activeBoss.hp <= 90) {
                            activeBoss.phase = 2;
                            playEnrageSound();
                            activeBoss.flashTimer = 18; 
                        }
                        
                        const speed = activeBoss.phase === 1 ? 1.5 : 3.2;
                        activeBoss.x += activeBoss.dir * speed;
                        if (activeBoss.x < 45 || activeBoss.x > 315) {
                            activeBoss.dir *= -1;
                        }
                        
                        const aimedCooldown = activeBoss.phase === 1 ? 1100 : 825;
                        const spiralCooldown = activeBoss.phase === 1 ? 4000 : 3000;
                        const spawnCooldown = activeBoss.phase === 1 ? 4500 : 3500;
                        
                        if (currentTime - activeBoss.lastAttackATime >= aimedCooldown) {
                            activeBoss.lastAttackATime = currentTime;
                            const angle = Math.atan2(player.y - activeBoss.y, player.x - activeBoss.x);
                            const vx = Math.cos(angle) * 5.0;
                            const vy = Math.sin(angle) * 5.0;
                            spawnEnemyBullet(activeBoss.x, activeBoss.y + 25, vx, vy, '#aa00ff', 5, 10);
                            playShootSound();
                        }
                        
                        if (currentTime - activeBoss.lastAttackBTime >= spiralCooldown) {
                            activeBoss.lastAttackBTime = currentTime;
                            for (let deg = 0; deg < 360; deg += 60) {
                                const rad = deg * Math.PI / 180;
                                const vx = Math.cos(rad) * 2.8;
                                const vy = Math.sin(rad) * 2.8;
                                spawnEnemyBullet(activeBoss.x, activeBoss.y + 25, vx, vy, '#aa00ff', 6, 6);
                            }
                            playShootSound();
                        }
                        
                        if (currentTime - activeBoss.lastAttackCTime >= spawnCooldown) {
                            activeBoss.lastAttackCTime = currentTime;
                            if (activeBoss.phase === 1) {
                                spawnZeroXpBerserker(activeBoss.x - 40, activeBoss.y + 40);
                                spawnZeroXpZigzagger(activeBoss.x + 40, activeBoss.y + 40);
                            } else {
                                spawnZeroXpBerserker(activeBoss.x - 40, activeBoss.y + 40);
                                spawnZeroXpBerserker(activeBoss.x + 40, activeBoss.y + 40);
                            }
                        }
                    }
                }
            }

            // Update Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (e.id === 99 || e.xp === 0) {
                    e.update(e, frameCount);
                } else {
                    e.customUpdate(e, frameCount);
                }
                if (e.y > 680) {
                    enemies.splice(i, 1);
                }
            }

            // Update Enemy Bullets
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const eb = enemyBullets[i];
                if (eb.isHoming) {
                    eb.x += (player.x - eb.x) * 0.03;
                    eb.y += eb.vy;
                } else {
                    eb.x += eb.vx;
                    eb.y += eb.vy;
                }
                if (eb.y > 660 || eb.y < -20 || eb.x < -20 || eb.x > 380) {
                    enemyBullets.splice(i, 1);
                }
            }

            if (currentTime >= nextSpawnTime) {
                if (spawnerActive && enemies.length < 4) {
                    spawnEnemy();
                }
                nextSpawnTime = currentTime + 1800;
            }

            checkCollisions();
        }

        // Render Frame
        ctx.fillStyle = '#0a0012';
        ctx.fillRect(0, 0, 360, 640);

        drawStars(ctx);
        drawMoon(ctx);

        if (state === 'TITLE') {
            drawTitleScreen(ctx);
        } else if (state === 'HOW_TO_PLAY') {
            drawHowToPlayScreen(ctx);
        } else if (state === 'PLAYING' || state === 'PAUSED') {
            
            // Render Death Star Laser Core & Warnings
            if (activeBoss && activeBoss.id === 3 && activeBoss.state !== 'ENTRY') {
                if (activeBoss.laserPhase === 'CHARGE') {
                    const progress = (1000 - activeBoss.laserTimer) / 1000;
                    const radius = 4 + 8 * progress;
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.4)';
                    ctx.beginPath();
                    ctx.arc(activeBoss.x, activeBoss.y + 10, radius, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#ff3333';
                    ctx.font = 'bold 11px "Courier New", Courier, monospace';
                    ctx.textAlign = 'center';
                    ctx.fillText("CHARGING...", activeBoss.x, activeBoss.y - activeBoss.h / 2 - 15);
                } else if (activeBoss.laserPhase === 'FIRE') {
                    ctx.fillStyle = 'rgba(255, 0, 0, 0.3)';
                    ctx.fillRect(activeBoss.x - 10, activeBoss.y + 20, 20, 640 - activeBoss.y);
                    ctx.fillStyle = '#ff0000';
                    ctx.fillRect(activeBoss.x - 5, activeBoss.y + 20, 10, 640 - activeBoss.y);
                }
            }

            // Render Enemy Bullets
            enemyBullets.forEach(eb => {
                ctx.fillStyle = eb.color || '#ff3333';
                if (eb.isBomb) {
                    ctx.fillRect(eb.x - eb.w / 2, eb.y - eb.h / 2, eb.w, eb.h);
                } else {
                    const rad = (eb.w || 6) / 2;
                    ctx.beginPath();
                    ctx.arc(eb.x, eb.y, rad, 0, Math.PI * 2);
                    ctx.fill();
                }
            });

            // Render Enemies & Enemy Health Bars
            enemies.forEach(e => {
                if (e.id === 99 || e.xp === 0) {
                    e.draw(ctx, e, frameCount);
                } else {
                    e.customDraw(ctx, e, frameCount);
                }

                if (e.maxHP > 1 && e.hp < e.maxHP) {
                    const barWidth = e.w;
                    const barHeight = 3;
                    const barX = e.x - barWidth / 2;
                    const barY = e.y - e.h / 2 - 6 - barHeight;

                    ctx.fillStyle = 'rgba(40,40,40,0.8)';
                    ctx.fillRect(barX, barY, barWidth, barHeight);

                    const pct = e.hp / e.maxHP;
                    let fillColor = '#cc3333'; 
                    if (pct > 0.6) {
                        fillColor = '#33cc33'; 
                    } else if (pct >= 0.3) {
                        fillColor = '#cccc33'; 
                    }

                    ctx.fillStyle = fillColor;
                    ctx.fillRect(barX, barY, barWidth * pct, barHeight);
                }
            });

            // Render Boss Ship Profile
            if (activeBoss) {
                drawBoss(ctx, activeBoss);
            }

            // Render Player Bullets
            ctx.fillStyle = '#ffffff';
            bullets.forEach(b => {
                ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
            });

            // Render Player Ship
            drawPlayerShip(ctx, player.x, player.y, frameCount);

            // Render Active Particles & Death Flashes
            updateAndDrawParticles(ctx);
            updateAndDrawFlashes(ctx);

            // Render Warning / HUD / Overlays
            drawBossWarningScreen(ctx);
            drawBossHealthBar(ctx);

            ctx.save();
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 15px "Courier New", Courier, monospace';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(`⭐ SCORE: ${score}`, 15, 25);
            ctx.restore();

            drawLives(ctx, lives);
            drawPauseButton(ctx);

            if (showBossDefeatedText > 0) {
                showBossDefeatedText--;
                ctx.fillStyle = '#ffcc00';
                ctx.font = 'bold 22px "Courier New", Courier, monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText("BOSS DEFEATED!", 180, 280);
                
                if (bossesDefeated >= 5) {
                    ctx.font = 'bold 11px "Courier New", Courier, monospace';
                    ctx.fillStyle = '#ffffff';
                    ctx.fillText("PHASE 3B BOSSES REMAIN UNIMPLEMENTED", 180, 310);
                    ctx.fillText("RESUMING ENDLESS MODE", 180, 325);
                }
            }

            if (playerDamageFlashFrame > 0) {
                const opacity = 0.25 * (playerDamageFlashFrame / playerDamageFlashMax);
                ctx.fillStyle = `rgba(255, 0, 0, ${opacity})`;
                ctx.fillRect(0, 0, 360, 640);
                playerDamageFlashFrame--;
            }

            if (state === 'PAUSED') {
                drawPauseOverlay(ctx);
            }
        }

        requestAnimationFrame(loop);
    }

    loop();
</script>
</body>
</html>

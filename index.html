    // --- DRAW SPRITE UTILITY ---
    function drawSprite(ctx, grid, x, y, pixelSize = 4) {
        const rows = grid.length;
        const cols = grid[0].length;
        const width = cols * pixelSize;
        const height = rows * pixelSize;
        const startX = x - width / 2;
        const startY = y - height / 2;
        
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const color = grid[r][c];
                if (color) {
                    ctx.fillStyle = color;
                    ctx.fillRect(
                        Math.floor(startX + c * pixelSize), 
                        Math.floor(startY + r * pixelSize), 
                        pixelSize, pixelSize
                    );
                }
            }
        }
    }

    // --- SCORE SYSTEM ---
    function addScore(amount) {
        score += amount;
    }

    // --- REDESIGNED SOUND SYSTEM (FIXES 1-6) ---
    function throttleSound(type) {
        const now = Date.now();
        if (lastPlayed[type] && now - lastPlayed[type] < 60) {
            return false; // Throttled (Fix 4 - 60ms Cooldown)
        }
        lastPlayed[type] = now;
        return true;
    }

    function getNoiseBuffer() {
        if (!audioCtx) return null;
        if (!noiseBuffer) {
            try {
                const sampleRate = audioCtx.sampleRate;
                noiseBuffer = audioCtx.createBuffer(1, sampleRate, sampleRate);
                const data = noiseBuffer.getChannelData(0);
                for (let i = 0; i < sampleRate; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
            } catch (e) {
                return null;
            }
        }
        return noiseBuffer;
    }

    function initAudio() {
        if (!audioCtx) {
            try {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                masterGain = audioCtx.createGain();
                masterGain.gain.setValueAtTime(0.85, audioCtx.currentTime); // Global volume set to 0.85 (Fix 6)
                masterGain.connect(audioCtx.destination);
                getNoiseBuffer(); // Warm noise buffer
            } catch (e) {
                console.error("Audio initialization failed:", e);
            }
        }
    }

    function unlockAudio() {
        if (audioUnlocked) return;
        initAudio();
        if (audioCtx) {
            audioCtx.resume().then(() => {
                audioUnlocked = true;
                playClickSound();
            }).catch(err => {
                console.warn("Audio Context unlock failed:", err);
            });
        }
    }

    function playShootSound() {
        if (!audioCtx || audioCtx.state === 'suspended' || !masterGain) return;
        if (!throttleSound('shoot')) return;
        try {
            const now = audioCtx.currentTime;
            const duration = 0.09; // 90ms (Fix 1)
            const startFreq = 1200 + (Math.random() * 100 - 50); // Randomize ±50Hz (Fix 1)

            // Layer 1: Sawtooth Oscillator primary laser sweep
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.type = 'sawtooth';
            osc1.frequency.setValueAtTime(startFreq, now);
            osc1.frequency.exponentialRampToValueAtTime(300, now + duration);
            
            gain1.gain.setValueAtTime(0.22, now);
            gain1.gain.exponentialRampToValueAtTime(0.001, now + duration);
            
            osc1.connect(gain1);
            gain1.connect(masterGain);

            // Layer 2: Higher harmonic sawtooth at 2x frequency
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.type = 'sawtooth';
            osc2.frequency.setValueAtTime(startFreq * 2, now);
            osc2.frequency.exponentialRampToValueAtTime(600, now + duration);
            
            gain2.gain.setValueAtTime(0.08, now);
            gain2.gain.exponentialRampToValueAtTime(0.001, now + duration);
            
            osc2.connect(gain2);
            gain2.connect(masterGain);
            
            osc1.start(now);
            osc1.stop(now + duration);
            osc2.start(now);
            osc2.stop(now + duration);
        } catch (e) {}
    }

    function playClickSound() {
        if (!audioCtx || audioCtx.state === 'suspended' || !masterGain) return;
        if (!throttleSound('click')) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.setValueAtTime(750, audioCtx.currentTime + 0.05);
            
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        } catch (e) {}
    }

    function playExplosionSound() {
        if (!audioCtx || audioCtx.state === 'suspended' || !masterGain) return;
        if (!throttleSound('explosion')) return;
        try {
            const now = audioCtx.currentTime;
            const duration = 0.22; // 220ms
            const buffer = getNoiseBuffer();

            // Layer A: white noise sweep lowpass (Fix 2)
            if (buffer) {
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;

                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                const startFilterFreq = 2000 + (Math.random() * 400 - 200); // Randomize ±200Hz
                filter.frequency.setValueAtTime(startFilterFreq, now);
                filter.frequency.exponentialRampToValueAtTime(200, now + duration);

                const gainA = audioCtx.createGain();
                gainA.gain.setValueAtTime(0.4, now);
                gainA.gain.exponentialRampToValueAtTime(0.001, now + duration);

                source.connect(filter);
                filter.connect(gainA);
                gainA.connect(masterGain);
                
                source.start(now);
                source.stop(now + duration);
            }

            // Layer B: low sine punch (Fix 2)
            const osc = audioCtx.createOscillator();
            const gainB = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(90, now);
            
            gainB.gain.setValueAtTime(0.001, now);
            gainB.gain.linearRampToValueAtTime(0.3, now + 0.01);
            gainB.gain.exponentialRampToValueAtTime(0.001, now + 0.15); // 150ms
            
            osc.connect(gainB);
            gainB.connect(masterGain);
            osc.start(now);
            osc.stop(now + 0.15);
        } catch (e) {}
    }

    function playHitSound() {
        if (!audioCtx || audioCtx.state === 'suspended' || !masterGain) return;
        if (!throttleSound('hit')) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(180, audioCtx.currentTime);
            osc.frequency.setValueAtTime(90, audioCtx.currentTime + 0.05);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        } catch (e) {}
    }

    function playPlayerHitSound() {
        if (!audioCtx || audioCtx.state === 'suspended' || !masterGain) return;
        if (!throttleSound('player_hit')) return;
        try {
            const now = audioCtx.currentTime;
            const buffer = getNoiseBuffer();
            
            // Layer A: metallic noise (Fix 3)
            if (buffer) {
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'bandpass';
                filter.frequency.setValueAtTime(500, now);
                filter.Q.setValueAtTime(2.0, now);
                
                const gainA = audioCtx.createGain();
                gainA.gain.setValueAtTime(0.35, now);
                gainA.gain.exponentialRampToValueAtTime(0.001, now + 0.15); // 150ms
                
                source.connect(filter);
                filter.connect(gainA);
                gainA.connect(masterGain);
                
                source.start(now);
                source.stop(now + 0.15);
            }
            
            // Layer B: low sine thump (Fix 3)
            const osc = audioCtx.createOscillator();
            const gainB = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(100, now);
            
            gainB.gain.setValueAtTime(0.3, now);
            gainB.gain.exponentialRampToValueAtTime(0.001, now + 0.12); // 120ms
            
            osc.connect(gainB);
            gainB.connect(masterGain);
            
            osc.start(now);
            osc.stop(now + 0.12);
        } catch (e) {}
    }

    // Fix 4: Boss Explosion sound compilation
    function playBigExplosion() {
        if (!audioCtx || audioCtx.state === 'suspended' || !masterGain) return;
        if (!throttleSound('big_explosion')) return;
        try {
            const now = audioCtx.currentTime;
            const buffer = getNoiseBuffer();

            // Heavy noise sweep (500ms)
            if (buffer) {
                const source = audioCtx.createBufferSource();
                source.buffer = buffer;
                
                const filter = audioCtx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(2500, now);
                filter.frequency.exponentialRampToValueAtTime(150, now + 0.5);
                
                const gainA = audioCtx.createGain();
                gainA.gain.setValueAtTime(0.5, now);
                gainA.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
                
                source.connect(filter);
                filter.connect(gainA);
                gainA.connect(masterGain);
                
                source.start(now);
                source.stop(now + 0.5);
            }
            
            // Low punch layer at 60Hz (300ms)
            const oscB = audioCtx.createOscillator();
            const gainB = audioCtx.createGain();
            oscB.type = 'sine';
            oscB.frequency.setValueAtTime(60, now);
            
            gainB.gain.setValueAtTime(0.001, now);
            gainB.gain.linearRampToValueAtTime(0.4, now + 0.02);
            gainB.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
            
            oscB.connect(gainB);
            gainB.connect(masterGain);
            oscB.start(now);
            oscB.stop(now + 0.3);
            
            // Heavy rumble layer at 40Hz (400ms)
            const oscC = audioCtx.createOscillator();
            const gainC = audioCtx.createGain();
            oscC.type = 'sawtooth';
            oscC.frequency.setValueAtTime(40, now);
            
            gainC.gain.setValueAtTime(0.2, now);
            gainC.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
            
            oscC.connect(gainC);
            gainC.connect(masterGain);
            oscC.start(now);
            oscC.stop(now + 0.4);
        } catch (e) {}
    }

    // --- ADD: VISUAL FEEDBACK TRIGGERS (FIX 7 & 8) ---
    function spawnParticle(x, y, vx, vy, color, size, lifetimeInFrames) {
        const p = particles.find(p => !p.active);
        if (p) {
            p.active = true;
            p.x = x;
            p.y = y;
            p.vx = vx;
            p.vy = vy;
            p.color = color;
            p.size = size;
            p.startSize = size;
            p.lifetime = lifetimeInFrames;
            p.maxLifetime = lifetimeInFrames;
        }
    }

    function spawnDeathFlash(x, y) {
        deathFlashes.push({
            x: x,
            y: y,
            frame: 0,
            maxFrames: 7 // Grows from 2px to 16px over 120ms (~7 frames)
        });
    }

    function updateAndDrawFlashes(ctx) {
        for (let i = deathFlashes.length - 1; i >= 0; i--) {
            const f = deathFlashes[i];
            f.frame++;
            const pct = f.frame / f.maxFrames;
            if (pct > 1) {
                deathFlashes.splice(i, 1);
                continue;
            }
            const radius = 2 + 14 * pct; // Grows from 2px to 16px
            const opacity = 0.9 * (1 - pct); // Fades from 0.9 to 0
            ctx.fillStyle = `rgba(255, 255, 255, ${opacity})`;
            ctx.beginPath();
            ctx.arc(f.x, f.y, radius, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    function updateAndDrawParticles(ctx) {
        ctx.save();
        for (let i = 0; i < MAX_PARTICLES; i++) {
            const p = particles[i];
            if (p.active) {
                p.x += p.vx;
                p.y += p.vy;
                p.lifetime--;
                if (p.lifetime <= 0) {
                    p.active = false;
                    continue;
                }
                const currentSize = p.startSize * (p.lifetime / p.maxLifetime);
                ctx.fillStyle = p.color;
                ctx.fillRect(Math.floor(p.x - currentSize / 2), Math.floor(p.y - currentSize / 2), currentSize, currentSize);
            }
        }
        ctx.restore();
    }

    function triggerEnemyDeath(e) {
        playExplosionSound();
        addScore(e.xp);
        
        // Spawn 8 small particle squares (Fix 7)
        const col = e.color || '#ffffff';
        for (let i = 0; i < 8; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 4;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            spawnParticle(e.x, e.y, vx, vy, col, 4, 21); // 21 frames = 350ms
        }
        
        // Spawn death flash circle (Fix 7)
        spawnDeathFlash(e.x, e.y);
    }

    function triggerPlayerHitSparks(x, y) {
        const colors = ['#ffffff', '#ffaa00', '#ff5500'];
        for (let i = 0; i < 6; i++) {
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 3;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            const color = colors[Math.floor(Math.random() * colors.length)];
            spawnParticle(x, y, vx, vy, color, 3, 18); // 18 frames = 300ms
        }
    }

        lives = 3;
        player.x = 180;

        player.targetX = 180;
        player.targetY = 500;
        bullets = [];

        deathFlashes.length = 0;

    function triggerPlayerHit() {
        if (isInvincible) return;
        lives -= 1;
        playPlayerHitSound();
        
        // Fix 8: Screen Flash & Spark Reaction
        playerDamageFlashFrame = playerDamageFlashMax;
        triggerPlayerHitSparks(player.x, player.y);

        if (lives <= 0) {
            state = 'TITLE';
        } else {
            isInvincible = true;
            invincibilityTimer = Date.now() + 1500;
        }
    }

            ctx.fillStyle = '#ff5500';
            ctx.fillRect(x - 2, y + 22, 4, 4);

            ctx.fillRect(x - 4, y + 18, 8, 4);

    // --- ENEMY SPAWNER LOGIC ---
    function getRandomEnemyType() {
        const activePool = ENEMY_TYPES;
        let totalWeight = 0;
        activePool.forEach(t => totalWeight += t.weight);
        let rand = Math.random() * totalWeight;
        for (let i = 0; i < activePool.length; i++) {
            if (rand < activePool[i].weight) {
                return activePool[i];
            }
            rand -= activePool[i].weight;
        }
        return activePool[0];
    }

    function spawnEnemy() {
        const type = getRandomEnemyType();
        const margin = type.w / 2;
        const spawnX = margin + Math.random() * (360 - margin * 2);
        const enemyObj = {
            id: type.id,
            name: type.name,
            x: spawnX,
            y: -40,
            w: type.w,
            h: type.h,
            hp: type.hp,
            maxHP: type.hp,
            xp: type.xp,
            color: type.color,
            speed: type.speed,
            customUpdate: type.update,
            customDraw: type.draw
        };
        if (type.init) {
            type.init(enemyObj);
        }
        enemies.push(enemyObj);
    }

    function spawnEnemyBullet(x, y, vx, vy) {

    }

    // --- COLLISION DETECTION ---
    function checkCollisions() {
        // Player Bullets vs Enemies
        for (let bIdx = bullets.length - 1; bIdx >= 0; bIdx--) {
            const b = bullets[bIdx];
            for (let eIdx = enemies.length - 1; eIdx >= 0; eIdx--) {
                const e = enemies[eIdx];

                // AABB overlap with shrink hitbox 2px each side
                const ex1 = e.x - e.w / 2 + 2;
                const ex2 = e.x + e.w / 2 - 2;
                const ey1 = e.y - e.h / 2 + 2;
                const ey2 = e.y + e.h / 2 - 2;

                const bx1 = b.x - 2;
                const bx2 = b.x + 2;
                const by1 = b.y - 6;
                const by2 = b.y + 6;

                if (bx1 < ex2 && bx2 > ex1 && by1 < ey2 && by2 > ey1) {
                    // Shield Cruiser blocks bullets from front when active
                    if (e.id === 7 && e.shieldActive && b.y > e.y) {
                        bullets.splice(bIdx, 1);
                        playShieldHitSound();
                        break;
                    }

                    e.hp -= 1;
                    bullets.splice(bIdx, 1);
                    if (e.hp <= 0) {
                        triggerEnemyDeath(e); // Trigger death animations & explosions
                        enemies.splice(eIdx, 1);
                    } else {
                        playHitSound();
                    }
                    break;
                }
            }
        }

        // Enemy Bullets vs Player (Player Hitbox 24x30px)
        const px1 = player.x - 12;
        const px2 = player.x + 12;
        const py1 = player.y - 15;
        const py2 = player.y + 15;

        if (!isInvincible) {
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const eb = enemyBullets[i];
                const ebx1 = eb.x - 3;
                const ebx2 = eb.x + 3;
                const eby1 = eb.y - 3;
                const eby2 = eb.y + 3;

                if (ebx1 < px2 && ebx2 > px1 && eby1 < py2 && eby2 > py1) {
                    enemyBullets.splice(i, 1);
                    triggerPlayerHit();
                    break;
                }
            }

            // Player vs Enemies (Ramming)
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const ex1 = e.x - e.w / 2 + 2;
                const ex2 = e.x + e.w / 2 - 2;
                const ey1 = e.y - e.h / 2 + 2;
                const ey2 = e.y + e.h / 2 - 2;

                if (ex1 < px2 && ex2 > px1 && ey1 < py2 && ey2 > py1) {
                    triggerEnemyDeath(e); // Trigger death particles on ramming
                    enemies.splice(i, 1);
                    triggerPlayerHit();
                    break;
                }
            }
        }
    }

    // --- UI BUTTON DEFINITIONS ---
    const startButton = { x: 80, y: 340, w: 200, h: 44 };
    const howToPlayButton = { x: 80, y: 400, w: 200, h: 44 };
    const backButton = { x: 105, y: 480, w: 150, h: 44 };
    const resumeButton = { x: 80, y: 280, w: 200, h: 44 };
    const menuButton = { x: 80, y: 340, w: 200, h: 44 };
    const pauseButton = { x: 15, y: 45, w: 32, h: 32 };

    function drawButton(ctx, btn, text) {
        ctx.save();
        ctx.fillStyle = '#0099aa';
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
        ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 15px "Courier New", Courier, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, btn.x + btn.w / 2, btn.y + btn.h / 2 + 1);
        ctx.restore();
    }

    function isPointInRect(px, py, rect) {
        return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
    }

    // --- COORDINATE CONVERSION FOR SCALING ---
    function getCanvasCoords(e, canvas) {
        const rect = canvas.getBoundingClientRect();
        let clientX, clientY;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    // --- INPUT EVENT HANDLING ---
    function handleStart(e, isTouch) {
        unlockAudio();
        const coords = getCanvasCoords(e, canvas);

        if (state === 'TITLE') {
            if (isPointInRect(coords.x, coords.y, startButton)) {
                playClickSound();
                resetGame();
                state = 'PLAYING';
            } else if (isPointInRect(coords.x, coords.y, howToPlayButton)) {
                playClickSound();
                state = 'HOW_TO_PLAY';
            }
        } else if (state === 'HOW_TO_PLAY') {
            if (isPointInRect(coords.x, coords.y, backButton)) {
                playClickSound();
                state = 'TITLE';
            }
        } else if (state === 'PLAYING') {
            if (isPointInRect(coords.x, coords.y, pauseButton)) {
                playClickSound();
                state = 'PAUSED';
            } else {
                isDragging = true;
                player.targetX = coords.x;
                player.targetY = coords.y;
            }
        } else if (state === 'PAUSED') {
            if (isPointInRect(coords.x, coords.y, resumeButton)) {
                playClickSound();
                state = 'PLAYING';
            } else if (isPointInRect(coords.x, coords.y, menuButton)) {
                playClickSound();
                state = 'TITLE';
            }
        }
    }

    function handleMove(e) {
        if (state === 'PLAYING' && isDragging) {
            const coords = getCanvasCoords(e, canvas);
            player.targetX = coords.x;
            player.targetY = coords.y;
        }
    }

    function handleEnd(e) {
        isDragging = false;
    }

    // Touch Support
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleStart(e, true);
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        handleMove(e);
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        handleEnd(e);
    }, { passive: false });

    // Mouse Fallback
    canvas.addEventListener('mousedown', (e) => {
        handleStart(e, false);
    });

    canvas.addEventListener('mousemove', (e) => {
        handleMove(e);
    });

    window.addEventListener('mouseup', (e) => {
        handleEnd(e);
    });

    // --- SCREEN RENDERERS ---
    function drawTitleScreen(ctx) {
        ctx.save();
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        const bounce = Math.sin(frameCount * 0.05) * 5;

        ctx.font = 'bold 34px "Courier New", Courier, monospace';
        ctx.fillStyle = '#ff007f';
        ctx.fillText("SPACE", 183, 113 + bounce);
        ctx.fillStyle = '#00ffff';
        ctx.fillText("SPACE", 180, 110 + bounce);

        ctx.font = 'bold 34px "Courier New", Courier, monospace';
        ctx.fillStyle = '#0055ff';
        ctx.fillText("STRIKER", 183, 158 + bounce);
        ctx.fillStyle = '#ffff00';
        ctx.fillText("STRIKER", 180, 155 + bounce);
        ctx.restore();

        const shipFloatY = 240 + Math.sin(frameCount * 0.08) * 8;
        drawPlayerShip(ctx, 180, shipFloatY, frameCount);

        ctx.save();
        ctx.fillStyle = Math.floor(frameCount / 25) % 2 === 0 ? '#ffcc00' : 'rgba(255, 204, 0, 0.35)';
        ctx.font = '12px "Courier New", Courier, monospace';
        ctx.textAlign = 'center';
        const msg = audioUnlocked ? "🔉 AUDIO SYSTEM ACTIVE" : "⚡ TAP TO ENABLE SOUND";
        ctx.fillText(msg, 180, 305);
        ctx.restore();

        drawButton(ctx, startButton, "START GAME");
        drawButton(ctx, howToPlayButton, "HOW TO PLAY");
    }

    function drawHowToPlayScreen(ctx) {
        ctx.save();
        ctx.fillStyle = 'rgba(10, 0, 18, 0.85)';
        ctx.fillRect(0, 0, 360, 640);

        ctx.fillStyle = '#00ffff';
        ctx.font = 'bold 22px "Courier New", Courier, monospace';
        ctx.textAlign = 'center';
        ctx.fillText("HOW TO PLAY", 180, 110);

        ctx.fillStyle = '#ffffff';
        ctx.font = '13px "Courier New", Courier, monospace';

        const textLines = [
            "TOUCH & DRAG TO MOVE SHIP",
            "THE SHIP WILL SMOOTHLY",
            "FOLLOW YOUR INPUT PATH",
            "",
            "SHIP WEAPONS FIRE AUTOMATICALLY",
            "ON A 400MS TIMER COOLDOWN",
            "",
            "DODGE INCOMING ENEMIES & SHOTS",
            "TEN SHIP TYPES THREATEN YOU",
            "",
            "TAP PAUSE BUTTON [⏸] TO COOLDOWN"
        ];

        for (let i = 0; i < textLines.length; i++) {
            ctx.fillText(textLines[i], 180, 170 + (i * 22));
        }
        ctx.restore();

        drawButton(ctx, backButton, "BACK");
    }

    function drawPauseButton(ctx) {
        ctx.save();
        ctx.fillStyle = 'rgba(255, 255, 255, 0.08)';
        ctx.strokeStyle = '#00ffff';
        ctx.lineWidth = 1.5;
        ctx.fillRect(pauseButton.x, pauseButton.y, pauseButton.w, pauseButton.h);
        ctx.strokeRect(pauseButton.x, pauseButton.y, pauseButton.w, pauseButton.h);

        ctx.fillStyle = '#ffffff';
        ctx.fillRect(pauseButton.x + 10, pauseButton.y + 10, 4, 12);
        ctx.fillRect(pauseButton.x + 18, pauseButton.y + 10, 4, 12);
        ctx.restore();
    }

    function drawPauseOverlay(ctx) {
        ctx.save();
        ctx.fillStyle = 'rgba(10, 0, 18, 0.85)';
        ctx.fillRect(0, 0, 360, 640);

        ctx.fillStyle = '#ffcc00';
        ctx.font = 'bold 28px "Courier New", Courier, monospace';
        ctx.textAlign = 'center';
        ctx.fillText("PAUSED", 180, 210);
        ctx.restore();

        drawButton(ctx, resumeButton, "RESUME");
        drawButton(ctx, menuButton, "MAIN MENU");
    }

    // --- GAME ENGINE LOOP ---
    function loop() {
        frameCount++;

        // Update Parallax Background
        updateStars();

        if (state === 'PLAYING') {
            // Apply smoothing movement (lerp)
            player.x += (player.targetX - player.x) * 0.15;
            player.y += (player.targetY - player.y) * 0.15;

            // Clamping bounds
            const halfW = player.width / 2;
            const halfH = player.height / 2;
            if (player.x < halfW) player.x = halfW;
            if (player.x > 360 - halfW) player.x = 360 - halfW;
            if (player.y < halfH) player.y = halfH;
            if (player.y > 640 - halfH) player.y = 640 - halfH;

            // Player shooting timer
            const currentTime = Date.now();
            if (currentTime - lastShotTime >= 400) {
                bullets.push({ x: player.x, y: player.y - 20 });
                lastShotTime = currentTime;
                playShootSound();
            }

            // Move player bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= 13;
                if (bullets[i].y < -20) {
                    bullets.splice(i, 1);
                }
            }

            // Update Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (e.id === 99) {
                    e.update(e, frameCount);
                } else {
                    e.customUpdate(e, frameCount);
                }
                if (e.y > 680) {
                    enemies.splice(i, 1);
                }
            }

            // Update Enemy Bullets
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const eb = enemyBullets[i];
                eb.x += eb.vx;
                eb.y += eb.vy;
                if (eb.y > 660 || eb.y < -20 || eb.x < -20 || eb.x > 380) {
                    enemyBullets.splice(i, 1);
                }
            }

            // Spawner controls (Capped at 6 max concurrent enemies, 1400ms interval)
            if (currentTime >= nextSpawnTime) {
                if (enemies.length < 6) {
                    spawnEnemy();
                }
                nextSpawnTime = currentTime + 1400;
            }

            // Run Collision System
            checkCollisions();
        }

        // Render Frame
        ctx.fillStyle = '#0a0012';
        ctx.fillRect(0, 0, 360, 640);

        drawStars(ctx);
        drawMoon(ctx);

        if (state === 'TITLE') {
            drawTitleScreen(ctx);
        } else if (state === 'HOW_TO_PLAY') {
            drawHowToPlayScreen(ctx);
        } else if (state === 'PLAYING' || state === 'PAUSED') {
            // Render Enemy Bullets
            ctx.fillStyle = '#ff3333';
            enemyBullets.forEach(eb => {
                ctx.beginPath();
                ctx.arc(eb.x, eb.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });

            // Render Enemies & Enemy Health Bars
            enemies.forEach(e => {
                if (e.id === 99) {
                    e.draw(ctx, e, frameCount);
                } else {
                    e.customDraw(ctx, e, frameCount);
                }

                // Health bar logic for enemies with maxHP > 1 that are damaged
                if (e.maxHP > 1 && e.hp < e.maxHP) {
                    const barWidth = e.w;
                    const barHeight = 3;
                    const barX = e.x - barWidth / 2;
                    const barY = e.y - e.h / 2 - 6 - barHeight;

                    // Bar Background
                    ctx.fillStyle = 'rgba(40,40,40,0.8)';
                    ctx.fillRect(barX, barY, barWidth, barHeight);

                    // Health percentage color-coding
                    const pct = e.hp / e.maxHP;
                    let fillColor = '#cc3333'; // Below 30% HP
                    if (pct > 0.6) {
                        fillColor = '#33cc33'; // Above 60% HP
                    } else if (pct >= 0.3) {
                        fillColor = '#cccc33'; // Between 30% and 60% HP
                    }

                    ctx.fillStyle = fillColor;
                    ctx.fillRect(barX, barY, barWidth * pct, barHeight);
                }
            });

            // Render Player Bullets
            ctx.fillStyle = '#ffffff';
            bullets.forEach(b => {
                ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
            });

            // Render Player Ship
            drawPlayerShip(ctx, player.x, player.y, frameCount);

            // Render Active Particles & Death Flashes
            updateAndDrawParticles(ctx);
            updateAndDrawFlashes(ctx);

            // Render HUD Score
            ctx.save();
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 15px "Courier New", Courier, monospace';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(`⭐ SCORE: ${score}`, 15, 25);
            ctx.restore();

            // Render Lives & Pause Button
            drawLives(ctx, lives);
            drawPauseButton(ctx);

            // Draw full red canvas flash overlay on player hit
            if (playerDamageFlashFrame > 0) {
                const opacity = 0.25 * (playerDamageFlashFrame / playerDamageFlashMax);
                ctx.fillStyle = `rgba(255, 0, 0, ${opacity})`;
                ctx.fillRect(0, 0, 360, 640);
                playerDamageFlashFrame--;
            }

            if (state === 'PAUSED') {
                drawPauseOverlay(ctx);
            }
        }

        requestAnimationFrame(loop);
    }

    // Begin Game Initialization
    loop();
</script>

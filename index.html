    <style>

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

            width: 100vw;
            height: 100vh;
            max-width: 360px;
            max-height: 640px;
            object-fit: contain;
            background: #0a0012;
            display: block;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
        }
    </style>
</head>

    // --- DRAW SPRITE UTILITY ---
    function drawSprite(ctx, grid, x, y, pixelSize = 4) {
        const rows = grid.length;
        const cols = grid[0].length;
        const width = cols * pixelSize;
        const height = rows * pixelSize;
        const startX = x - width / 2;
        const startY = y - height / 2;
        
        for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
                const color = grid[r][c];
                if (color) {
                    ctx.fillStyle = color;
                    ctx.fillRect(
                        Math.floor(startX + c * pixelSize), 
                        Math.floor(startY + r * pixelSize), 
                        pixelSize, pixelSize
                    );
                }
            }
        }
    }

    // --- SCORE SYSTEM ---
    function addScore(amount) {
        score += amount;
    }

    // --- FIX 2: REDESIGNED SOUND SYSTEM ---
    let audioCtx = null;
    let audioUnlocked = false;
    let masterGain = null;
    let noiseBuffer = null;
    const lastPlayed = {};

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            masterGain = audioCtx.createGain();
            masterGain.gain.setValueAtTime(0.6, audioCtx.currentTime); // Master volume sitting at a comfortable 0.6
            masterGain.connect(audioCtx.destination);
        }
    }

    function unlockAudio() {
        if (audioUnlocked) return;
        initAudio();
        if (audioCtx) {
            audioCtx.resume().then(() => {
                audioUnlocked = true;
                playClickSound();
            }).catch(err => {
                console.warn("Audio Context unlock failed:", err);
            });
        }
    }

    function throttleSound(type) {
        const now = Date.now();
        if (lastPlayed[type] && now - lastPlayed[type] < 60) {
            return false; // Throttled (prevents harsh rapid overlapping)
        }
        lastPlayed[type] = now;
        return true;
    }

    function getNoiseBuffer() {
        if (!audioCtx) return null;
        if (!noiseBuffer) {
            const bufferSize = audioCtx.sampleRate * 0.1; // 100ms noise burst
            noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = noiseBuffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
        }
        return noiseBuffer;
    }

    function playShootSound() {
        if (!audioCtx || audioCtx.state === 'suspended') return;
        if (!throttleSound('shoot')) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            
            // Randomize pitch each play: 700Hz with +/- 30Hz variation
            const freq = 700 + (Math.random() * 60 - 30);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            // Short soft Tick (40ms)
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);
        } catch (e) {
            // Audio error safety
        }
    }

    function playClickSound() {
        if (!audioCtx || audioCtx.state === 'suspended') return;
        if (!throttleSound('click')) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(500, audioCtx.currentTime);
            osc.frequency.setValueAtTime(750, audioCtx.currentTime + 0.05);
            
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        } catch (e) {
            // Audio error safety
        }
    }

    function playExplosionSound() {
        if (!audioCtx || audioCtx.state === 'suspended') return;
        if (!throttleSound('explosion')) return;
        try {
            const buffer = getNoiseBuffer();
            if (!buffer) return;
            
            const source = audioCtx.createBufferSource();
            source.buffer = buffer;

            // Punchy white noise with lowpass filter (650–750Hz pitch variation)
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            const filterFreq = 650 + Math.random() * 100;
            filter.frequency.setValueAtTime(filterFreq, audioCtx.currentTime);

            const gain = audioCtx.createGain();
            gain.gain.setValueAtTime(0.25, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);

            source.connect(filter);
            filter.connect(gain);
            gain.connect(masterGain);
            
            source.start();
            source.stop(audioCtx.currentTime + 0.1);
        } catch (e) {}
    }

    function playHitSound() {
        if (!audioCtx || audioCtx.state === 'suspended') return;
        if (!throttleSound('hit')) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(180, audioCtx.currentTime);
            osc.frequency.setValueAtTime(90, audioCtx.currentTime + 0.05);
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        } catch (e) {}
    }

    function playPlayerHitSound() {
        if (!audioCtx || audioCtx.state === 'suspended') return;
        if (!throttleSound('player_hit')) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Soft impact thud - 150Hz sine wave, 180ms
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.35, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.18);
            
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.18);
        } catch (e) {}
    }

    function playShieldHitSound() {
        if (!audioCtx || audioCtx.state === 'suspended') return;
        if (!throttleSound('shield_hit')) return;
        try {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1500, audioCtx.currentTime + 0.08);
            
            gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.08);
            
            osc.connect(gain);
            gain.connect(masterGain);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        } catch (e) {}
    }

    // --- BACKGROUND STACK (PARALLAX & MOON) ---
    const stars1 = [];
    const stars2 = [];
    const stars3 = [];

    // Layer 1: 50 tiny white 1px dots
    for (let i = 0; i < 50; i++) {
        stars1.push({ x: Math.random() * 360, y: Math.random() * 640 });
    }
    // Layer 2: 25 cyan 2px dots
    for (let i = 0; i < 25; i++) {
        stars2.push({ x: Math.random() * 360, y: Math.random() * 640 });
    }
    // Layer 3: 12 yellow 3px dots
    for (let i = 0; i < 12; i++) {
        stars3.push({ x: Math.random() * 360, y: Math.random() * 640 });
    }

    function updateStars() {
        stars1.forEach(s => { s.y += 0.5; if (s.y > 640) s.y = 0; });
        stars2.forEach(s => { s.y += 1.0; if (s.y > 640) s.y = 0; });
        stars3.forEach(s => { s.y += 1.8; if (s.y > 640) s.y = 0; });
    }

    function drawStars(ctx) {
        // Layer 1
        ctx.fillStyle = '#ffffff';
        stars1.forEach(s => ctx.fillRect(s.x, s.y, 1, 1));
        
        // Layer 2
        ctx.fillStyle = '#00ffff';
        stars2.forEach(s => ctx.fillRect(s.x, s.y, 2, 2));
        
        // Layer 3
        ctx.fillStyle = '#ffff00';
        stars3.forEach(s => ctx.fillRect(s.x, s.y, 3, 3));
    }

    const moonCraters = [
        { x: 250, y: 70, r: 10 },
        { x: 290, y: 130, r: 7 },
        { x: 240, y: 110, r: 5 },
        { x: 310, y: 75, r: 8 },
        { x: 275, y: 85, r: 4 }
    ];

    function drawMoon(ctx) {
        // Soft outer glow
        let glow = ctx.createRadialGradient(280, 100, 60, 280, 100, 95);
        glow.addColorStop(0, 'rgba(50, 50, 100, 0.35)');
        glow.addColorStop(1, 'rgba(0, 0, 0, 0)');
        ctx.fillStyle = glow;
        ctx.beginPath();
        ctx.arc(280, 100, 95, 0, Math.PI * 2);
        ctx.fill();

        // Moon body
        ctx.fillStyle = '#15152a';
        ctx.beginPath();
        ctx.arc(280, 100, 70, 0, Math.PI * 2);
        ctx.fill();

        // Craters
        ctx.fillStyle = '#0c0c1b';
        moonCraters.forEach(c => {
            ctx.beginPath();
            ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
            ctx.fill();
        });
    }

    // --- PLAYER CONFIGURATION ---
    const player = {
        x: 180,
        y: 500,
        targetX: 180,
        targetY: 500,
        width: 32,
        height: 40
    };

    let bullets = [];
    let lastShotTime = 0;
    let isDragging = false;
    let isInvincible = false;
    let invincibilityTimer = 0;

    function resetGame() {
        score = 0;
        lives = 3;
        player.x = 180;
        player.y = 500;
        player.targetX = 180;
        player.targetY = 500;
        bullets = [];
        lastShotTime = 0;
        enemies = [];
        enemyBullets = [];
        isInvincible = false;
        invincibilityTimer = 0;
        nextSpawnTime = Date.now() + 1000;
    }

    function triggerPlayerHit() {
        if (isInvincible) return;
        lives -= 1;
        playPlayerHitSound();
        if (lives <= 0) {
            state = 'TITLE';
        } else {
            isInvincible = true;
            invincibilityTimer = Date.now() + 1500;
        }
    }

    function drawPlayerShip(ctx, x, y, frame) {
        if (isInvincible) {
            const now = Date.now();
            if (now > invincibilityTimer) {
                isInvincible = false;
            } else {
                // Flash ship sprite on screen
                if (Math.floor(frame / 4) % 2 === 0) {
                    return;
                }
            }
        }

        // Animated dynamic engine flame below the ship
        if (Math.floor(frame / 3) % 2 === 0) {
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(x - 4, y + 18, 8, 6);
            ctx.fillStyle = '#ff5500';
            ctx.fillRect(x - 2, y + 22, 4, 4);
        } else {
            ctx.fillStyle = '#ffcc00';
            ctx.fillRect(x - 4, y + 18, 8, 4);
        }

        // Draw Player sprite grid (cyan body, orange wings, white cockpit)
        drawSprite(ctx, PLAYER_SPRITE, x, y, 4);
    }

    function drawLives(ctx, count) {
        const startX = 335;
        const startY = 25;
        const spacing = 18;
        for (let i = 0; i < count; i++) {
            drawSprite(ctx, PLAYER_SPRITE, startX - (i * spacing), startY, 2);
        }
    }

    // --- ENEMY SHIP CONFIGURATION AND ARRAYS ---
    let enemies = [];
    let enemyBullets = [];
    let nextSpawnTime = 0;

            update: (e, frame) => {
                e.y += e.vy;
                if (frame % 100 === 0 && Math.random() < 0.6) {
                    spawnEnemyBullet(e.x, e.y + e.h / 2, 0, 4);
                }
            },
            draw: (ctx, e, frame) => {
                drawSprite(ctx, SCOUT_SPRITE, e.x, e.y, 4);
            }
        },
        {
            id: 2, name: "Interceptor", xp: 50, hp: 2, weight: 80,

            init: (e) => { e.vx = 1.5; e.vy = e.speed; },
            update: (e, frame) => {
                e.y += e.vy;
                e.x += e.vx;
                if (e.x < e.w / 2 || e.x > 360 - e.w / 2) {
                    e.vx *= -1;
                }
                if (frame % 120 === 0) {
                    const angle = Math.atan2(player.y - e.y, player.x - e.x);
                    spawnEnemyBullet(e.x, e.y + e.h / 2, Math.cos(angle) * 3.5, Math.sin(angle) * 3.5);
                }
            },
            draw: (ctx, e, frame) => {
                drawSprite(ctx, INTERCEPTOR_SPRITE, e.x, e.y, 4);
            }
        },

            id: 3, name: "Bomber", xp: 70, hp: 4, weight: 60,
            w: 36, h: 28, speed: 1.2,
            color: '#ff3333', // Crimson Red
            init: (e) => { e.vx = 0; e.vy = e.speed; },
            update: (e, frame) => {
                e.y += e.vy;
                if (frame % 140 === 0) {
                    spawnEnemyBullet(e.x, e.y + e.h / 2, 0, 3);
                    spawnEnemyBullet(e.x, e.y + e.h / 2, -1.2, 2.7);
                    spawnEnemyBullet(e.x, e.y + e.h / 2, 1.2, 2.7);
                }
            },
            draw: (ctx, e, frame) => {
                drawSprite(ctx, BOMBER_SPRITE, e.x, e.y, 4);
            }
        },
        {
            id: 4, name: "Fighter", xp: 70, hp: 3, weight: 60,

    // --- ENEMY SPAWNER LOGIC ---
    function getRandomEnemyType() {
        const activePool = ENEMY_TYPES;
        let totalWeight = 0;
        activePool.forEach(t => totalWeight += t.weight);
        let rand = Math.random() * totalWeight;
        for (let i = 0; i < activePool.length; i++) {
            if (rand < activePool[i].weight) {
                return activePool[i];
            }
            rand -= activePool[i].weight;
        }
        return activePool[0];
    }

    function spawnEnemy() {
        const type = getRandomEnemyType();
        const margin = type.w / 2;
        const spawnX = margin + Math.random() * (360 - margin * 2);
        const enemyObj = {
            id: type.id,
            name: type.name,
            x: spawnX,
            y: -40,
            w: type.w,
            h: type.h,
            hp: type.hp,
            maxHP: type.hp, // Set max HP
            xp: type.xp,
            color: type.color,
            speed: type.speed,
            customUpdate: type.update,
            customDraw: type.draw
        };
        if (type.init) {
            type.init(enemyObj);
        }
        enemies.push(enemyObj);
    }

    function spawnSwarmerDrone(x, y) {
        enemies.push({
            id: 99, 
            name: "Swarmer",
            x: x,
            y: y,
            vx: 0,
            vy: 4.5,
            w: 12,
            h: 12,
            hp: 1,
            maxHP: 1, // 1 HP max
            xp: 15,
            color: '#ffd700',
            locked: false,
            update: function (e, frame) {
                if (!e.locked) {
                    e.locked = true;
                    const dx = player.x - e.x;
                    const dy = player.y - e.y;
                    const dist = Math.hypot(dx, dy);
                    e.vx = (dx / dist) * 4.5;
                    e.vy = (dy / dist) * 4.5;
                }
                e.x += e.vx;
                e.y += e.vy;
            },
            draw: function (ctx, e, frame) {
                drawSprite(ctx, SWARMER_DRONE_SPRITE, e.x, e.y, 3);
            }
        });
    }

    function spawnEnemyBullet(x, y, vx, vy) {
        enemyBullets.push({ x, y, vx, vy });
    }

    // --- COLLISION DETECTION ---
    function checkCollisions() {
        // Player Bullets vs Enemies
        for (let bIdx = bullets.length - 1; bIdx >= 0; bIdx--) {
            const b = bullets[bIdx];
            for (let eIdx = enemies.length - 1; eIdx >= 0; eIdx--) {
                const e = enemies[eIdx];

                // AABB overlap with shrink hitbox 2px each side
                const ex1 = e.x - e.w / 2 + 2;
                const ex2 = e.x + e.w / 2 - 2;
                const ey1 = e.y - e.h / 2 + 2;
                const ey2 = e.y + e.h / 2 - 2;

                const bx1 = b.x - 2;
                const bx2 = b.x + 2;
                const by1 = b.y - 6;
                const by2 = b.y + 6;

                if (bx1 < ex2 && bx2 > ex1 && by1 < ey2 && by2 > ey1) {
                    // Shield Cruiser blocks bullets from front when active
                    if (e.id === 7 && e.shieldActive && b.y > e.y) {
                        bullets.splice(bIdx, 1);
                        playShieldHitSound();
                        break;
                    }

                    e.hp -= 1;
                    bullets.splice(bIdx, 1);
                    if (e.hp <= 0) {
                        addScore(e.xp);
                        enemies.splice(eIdx, 1);
                        playExplosionSound();
                    } else {
                        playHitSound();
                    }
                    break;
                }
            }
        }

        // Enemy Bullets vs Player (Player Hitbox 24x30px)
        const px1 = player.x - 12;
        const px2 = player.x + 12;
        const py1 = player.y - 15;
        const py2 = player.y + 15;

        if (!isInvincible) {
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const eb = enemyBullets[i];
                const ebx1 = eb.x - 3;
                const ebx2 = eb.x + 3;
                const eby1 = eb.y - 3;
                const eby2 = eb.y + 3;

                if (ebx1 < px2 && ebx2 > px1 && eby1 < py2 && eby2 > py1) {
                    enemyBullets.splice(i, 1);
                    triggerPlayerHit();
                    break;
                }
            }

            // Player vs Enemies (Ramming)
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                const ex1 = e.x - e.w / 2 + 2;
                const ex2 = e.x + e.w / 2 - 2;
                const ey1 = e.y - e.h / 2 + 2;
                const ey2 = e.y + e.h / 2 - 2;

                if (ex1 < px2 && ex2 > px1 && ey1 < py2 && ey2 > py1) {
                    enemies.splice(i, 1);
                    triggerPlayerHit();
                    break;
                }
            }
        }
    }

    // --- UI BUTTON DEFINITIONS ---
    const startButton = { x: 80, y: 340, w: 200, h: 44 };
    const howToPlayButton = { x: 80, y: 400, w: 200, h: 44 };
    const backButton = { x: 105, y: 480, w: 150, h: 44 };
    const resumeButton = { x: 80, y: 280, w: 200, h: 44 };
    const menuButton = { x: 80, y: 340, w: 200, h: 44 };
    const pauseButton = { x: 15, y: 45, w: 32, h: 32 };

    function drawButton(ctx, btn, text) {
        ctx.save();
        ctx.fillStyle = '#0099aa';
        ctx.strokeStyle = '#ffffff';
        ctx.lineWidth = 2;
        ctx.fillRect(btn.x, btn.y, btn.w, btn.h);
        ctx.strokeRect(btn.x, btn.y, btn.w, btn.h);

        ctx.fillStyle = '#ffffff';
        ctx.font = 'bold 15px "Courier New", Courier, monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(text, btn.x + btn.w / 2, btn.y + btn.h / 2 + 1);
        ctx.restore();
    }

    function isPointInRect(px, py, rect) {
        return px >= rect.x && px <= rect.x + rect.w && py >= rect.y && py <= rect.y + rect.h;
    }

    // --- COORDINATE CONVERSION FOR SCALING ---
    function getCanvasCoords(e, canvas) {
        const rect = canvas.getBoundingClientRect();
        let clientX, clientY;
        if (e.touches && e.touches.length > 0) {
            clientX = e.touches[0].clientX;
            clientY = e.touches[0].clientY;
        } else {
            clientX = e.clientX;
            clientY = e.clientY;
        }
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        return {
            x: (clientX - rect.left) * scaleX,
            y: (clientY - rect.top) * scaleY
        };
    }

    // --- INPUT EVENT HANDLING ---
    function handleStart(e, isTouch) {
        unlockAudio();
        const coords = getCanvasCoords(e, canvas);

        if (state === 'TITLE') {
            if (isPointInRect(coords.x, coords.y, startButton)) {
                playClickSound();
                resetGame();
                state = 'PLAYING';
            } else if (isPointInRect(coords.x, coords.y, howToPlayButton)) {
                playClickSound();
                state = 'HOW_TO_PLAY';
            }
        } else if (state === 'HOW_TO_PLAY') {
            if (isPointInRect(coords.x, coords.y, backButton)) {
                playClickSound();
                state = 'TITLE';
            }
        } else if (state === 'PLAYING') {
            if (isPointInRect(coords.x, coords.y, pauseButton)) {
                playClickSound();
                state = 'PAUSED';
            } else {
                isDragging = true;
                player.targetX = coords.x;
                player.targetY = coords.y;
            }
        } else if (state === 'PAUSED') {
            if (isPointInRect(coords.x, coords.y, resumeButton)) {
                playClickSound();
                state = 'PLAYING';
            } else if (isPointInRect(coords.x, coords.y, menuButton)) {
                playClickSound();
                state = 'TITLE';
            }
        }
    }

    function handleMove(e) {
        if (state === 'PLAYING' && isDragging) {
            const coords = getCanvasCoords(e, canvas);
            player.targetX = coords.x;
            player.targetY = coords.y;
        }
    }

    function handleEnd(e) {
        isDragging = false;
    }

    // Touch Support
    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        handleStart(e, true);
    }, { passive: false });

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        handleMove(e);
    }, { passive: false });

    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        handleEnd(e);
    }, { passive: false });

    // Mouse Fallback
    canvas.addEventListener('mousedown', (e) => {
        handleStart(e, false);
    });

    canvas.addEventListener('mousemove', (e) => {
        handleMove(e);
    });

    window.addEventListener('mouseup', (e) => {
        handleEnd(e);
    });

    // --- GAME ENGINE LOOP ---
    function loop() {
        frameCount++;

        // Update Parallax Background
        updateStars();

        if (state === 'PLAYING') {
            // Apply smoothing movement (lerp)
            player.x += (player.targetX - player.x) * 0.15;
            player.y += (player.targetY - player.y) * 0.15;

            // Clamping bounds
            const halfW = player.width / 2;
            const halfH = player.height / 2;
            if (player.x < halfW) player.x = halfW;
            if (player.x > 360 - halfW) player.x = 360 - halfW;
            if (player.y < halfH) player.y = halfH;
            if (player.y > 640 - halfH) player.y = 640 - halfH;

            // Player shooting timer
            const currentTime = Date.now();
            if (currentTime - lastShotTime >= 400) {
                bullets.push({ x: player.x, y: player.y - 20 });
                lastShotTime = currentTime;
                playShootSound();
            }

            // Move player bullets
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y -= 13;
                if (bullets[i].y < -20) {
                    bullets.splice(i, 1);
                }
            }

            // Update Enemies
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (e.id === 99) {
                    e.update(e, frameCount);
                } else {
                    e.customUpdate(e, frameCount);
                }
                if (e.y > 680) {
                    enemies.splice(i, 1);
                }
            }

            // Update Enemy Bullets
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const eb = enemyBullets[i];
                eb.x += eb.vx;
                eb.y += eb.vy;
                if (eb.y > 660 || eb.y < -20 || eb.x < -20 || eb.x > 380) {
                    enemyBullets.splice(i, 1);
                }
            }

            // Spawner controls (Capped at 6 max concurrent enemies, 1400ms interval)
            if (currentTime >= nextSpawnTime) {
                if (enemies.length < 6) {
                    spawnEnemy();
                }
                nextSpawnTime = currentTime + 1400;
            }

            // Run Collision System
            checkCollisions();
        }

        // Render Frame
        ctx.fillStyle = '#0a0012';
        ctx.fillRect(0, 0, 360, 640);

        drawStars(ctx);
        drawMoon(ctx);

        if (state === 'TITLE') {
            drawTitleScreen(ctx);
        } else if (state === 'HOW_TO_PLAY') {
            drawHowToPlayScreen(ctx);
        } else if (state === 'PLAYING' || state === 'PAUSED') {
            // Render Enemy Bullets
            ctx.fillStyle = '#ff3333';
            enemyBullets.forEach(eb => {
                ctx.beginPath();
                ctx.arc(eb.x, eb.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });

            // Render Enemies & Enemy Health Bars (FIX 1)
            enemies.forEach(e => {
                if (e.id === 99) {
                    e.draw(ctx, e, frameCount);
                } else {
                    e.customDraw(ctx, e, frameCount);
                }

                // Health bar logic for enemies with maxHP > 1 that are damaged
                if (e.maxHP > 1 && e.hp < e.maxHP) {
                    const barWidth = e.w;
                    const barHeight = 3;
                    const barX = e.x - barWidth / 2;
                    const barY = e.y - e.h / 2 - 6 - barHeight;

                    // Bar Background
                    ctx.fillStyle = 'rgba(40,40,40,0.8)';
                    ctx.fillRect(barX, barY, barWidth, barHeight);

                    // Health percentage color-coding
                    const pct = e.hp / e.maxHP;
                    let fillColor = '#cc3333'; // Below 30% HP
                    if (pct > 0.6) {
                        fillColor = '#33cc33'; // Above 60% HP
                    } else if (pct >= 0.3) {
                        fillColor = '#cccc33'; // Between 30% and 60% HP
                    }

                    ctx.fillStyle = fillColor;
                    ctx.fillRect(barX, barY, barWidth * pct, barHeight);
                }
            });

            // Render Player Bullets
            ctx.fillStyle = '#ffffff';
            bullets.forEach(b => {
                ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
            });

            // Render Player Ship
            drawPlayerShip(ctx, player.x, player.y, frameCount);

            // Render HUD Score
            ctx.save();
            ctx.fillStyle = '#ffffff';
            ctx.font = 'bold 15px "Courier New", Courier, monospace';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(`⭐ SCORE: ${score}`, 15, 25);
            ctx.restore();

            // Render Lives & Pause Button
            drawLives(ctx, lives);
            drawPauseButton(ctx);

            if (state === 'PAUSED') {
                drawPauseOverlay(ctx);
            }
        }

        requestAnimationFrame(loop);
    }

    // Begin Game Initialization
    loop();
</script>

</body>
</html>
